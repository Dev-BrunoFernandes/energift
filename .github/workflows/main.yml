name: CI/CD Cidades ESGInteligentes

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  AZURE_WEBAPP_PACKAGE_PATH: '.'
  DOCKER_IMAGE_NAME: 'energift-api'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration Release --no-restore

    - name: Run Tests
      # O pipeline para aqui se os testes falharem
      run: dotnet test --no-build --verbosity normal

    - name: Publish Application
      run: dotnet publish src/Energift.Fiap.csproj -c Release -o ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}/myapp

    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: energift-app
        path: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}/myapp

  build-and-push-docker:
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - uses: actions/checkout@v4

    - name: Download build artifact
      uses: actions/download-artifact@v4
      with:
        name: energift-app
        path: myapp

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push Docker image
      id: docker_build
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        # Força o nome do repositório para minúsculas para evitar erro no Docker
        tags: ghcr.io/${{ github.repository | lower }}/${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }}
        build-args: |
          BUILD_VERSION=${{ github.sha }}

    - name: Save image tag for deploy
      run: |
        IMAGE_TAG=ghcr.io/${{ github.repository | lower }}/${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }}
        echo "$IMAGE_TAG" > docker-image-tag.txt

    - name: Upload Docker image tag
      uses: actions/upload-artifact@v4
      with:
        name: docker-image-tag
        path: docker-image-tag.txt

  deploy-staging:
    needs: build-and-push-docker
    runs-on: ubuntu-latest
    environment:
      name: Staging
    steps:
    - name: Download Docker image tag
      uses: actions/download-artifact@v4
      with:
        name: docker-image-tag

    - name: Read Docker image tag
      id: get_image_tag
      run: |
        TAG=$(cat docker-image-tag.txt)
        echo "DOCKER_IMAGE_TAG=$TAG" >> $GITHUB_ENV

    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Deploy to Azure Web App (Staging)
      uses: azure/webapps-deploy@v2
      with:
        app-name: ${{ secrets.AZURE_WEBAPP_NAME_STAGING }}
        images: '${{ env.DOCKER_IMAGE_TAG }}'

  deploy-production:
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment:
      name: Production
    steps:
    - name: Download Docker image tag
      uses: actions/download-artifact@v4
      with:
        name: docker-image-tag

    - name: Read Docker image tag
      run: |
        TAG=$(cat docker-image-tag.txt)
        echo "DOCKER_IMAGE_TAG=$TAG" >> $GITHUB_ENV

    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Deploy to Azure Web App (Production)
      uses: azure/webapps-deploy@v2
      with:
        app-name: ${{ secrets.AZURE_WEBAPP_NAME_PRODUCTION }}
        images: '${{ env.DOCKER_IMAGE_TAG }}'

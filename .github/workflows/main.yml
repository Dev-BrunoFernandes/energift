name: CI/CD Energift

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

env:
  AZURE_WEBAPP_PACKAGE_PATH: './publish'
  DOTNET_VERSION: '8.0.x'
  DOCKER_IMAGE_NAME: 'energift-api'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore Energift.Fiap.sln

    - name: Build application
      run: dotnet build Energift.Fiap.sln --configuration Release --no-restore

    - name: Run tests
      run: dotnet test Energift.Tests/Energift.Tests.csproj --configuration Release --no-build --logger "trx;LogFileName=test-results.trx" --results-directory ./testresults

    - name: Upload test results
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: ./testresults

    - name: Publish application
      run: dotnet publish src/Energift.Fiap.csproj --configuration Release -o ${{ env.AZURE_WEBAPP_PACKAGE_PATH }} --no-build

    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: energift-app
        path: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}

  build-and-push-docker:
    needs: build-and-test
    runs-on: ubuntu-latest
    # Permissões para o GITHUB_TOKEN para push no GHCR
    permissions:
      contents: read
      packages: write
    steps:
    - uses: actions/checkout@v4

    - name: Download build artifact
      uses: actions/download-artifact@v4
      with:
        name: energift-app
        path: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push Docker image
      id: docker_build
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: ghcr.io/${{ github.repository }}/${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }}
        build-args: |
          BUILD_VERSION=${{ github.sha }}

    - name: Save image tag for later steps
      run: echo "DOCKER_IMAGE_TAG=ghcr.io/${{ github.repository }}/${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }}" >> $GITHUB_ENV

    - name: Upload Docker image tag as artifact
      uses: actions/upload-artifact@v4
      with:
        name: docker-image-tag
        path: docker-image-tag.txt

  deploy-staging:
    needs: build-and-push-docker
    runs-on: ubuntu-latest
    environment:
      name: Staging
    steps:
    - name: Download Docker image tag
      uses: actions/download-artifact@v4
      with:
        name: docker-image-tag

    - name: Read Docker image tag
      id: get_image_tag
      run: echo "DOCKER_IMAGE_TAG=$(cat docker-image-tag/docker-image-tag.txt)" >> $GITHUB_ENV

    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Deploy to Azure Web App (Staging)
      uses: azure/webapps-deploy@v2
      with:
        app-name: ${{ secrets.AZURE_WEBAPP_NAME_STAGING }}
        images: '${{ env.DOCKER_IMAGE_TAG }}'

  deploy-production:
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment:
      name: Production
    steps:
    - name: Download Docker image tag
      uses: actions/download-artifact@v4
      with:
        name: docker-image-tag

    - name: Read Docker image tag
      id: get_image_tag
      run: echo "DOCKER_IMAGE_TAG=$(cat docker-image-tag/docker-image-tag.txt)" >> $GITHUB_ENV

    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Deploy to Azure Web App (Production)
      uses: azure/webapps-deploy@v2
      with:
        app-name: ${{ secrets.AZURE_WEBAPP_NAME_PRODUCTION }}
        images: '${{ env.DOCKER_IMAGE_TAG }}'
